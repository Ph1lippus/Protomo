<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protomo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <nav class="navbar" style="background-color: #333232; border-bottom: 2px solid #f9b9f2; padding: 0.8rem 0;">
        <div class="container justify-content-center">
            <span class="navbar-brand mb-0 h1" style="color: #eef4ed; font-family: 'Cinzel', serif; letter-spacing: 6px; font-weight: 700;">
                PROTOMO
            </span>
        </div>
    </nav>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
        <div class="card" style="width: 100%; max-width: 640px;">
            <div style="position: relative;" class="card-body text-center p-4 p-md-5">

                <button class="btn-icon btn-custom" style="position: absolute; top: 1.2rem; right: 1.2rem; background: transparent; border: none; padding: 0; font-size: 1.5rem; cursor: pointer;" id="settingsToggle" style="position: absolute; top: 1rem; right: 1rem;"><i class="fa-solid fa-gear fa-rotate-270"></i></button>
                <div id="modeLabel" class="study-mode h3 mb-1" style="letter-spacing: 4px;">STUDY</div>
                <div id="timerDisplay" class="study-mode display-1 fw-bold my-2" style="font-size: 6rem; line-height: 1.2;">25:00</div>

                <div class="d-flex gap-3 justify-content-center flex-wrap mt-3">
                    <button id="startPauseBtn" class="btn btn-custom btn-study">Start</button>
                    <button id="resetBtn" class="btn btn-custom btn-reset" style="border-color: #eef4ed; color: #eef4ed;">Reset</button>
                    <button id="skipBtn" class="btn btn-custom btn-skip">Skip</button>
                </div>

                <hr style="border-color: #444; margin: 2.5rem 0 1.5rem;">
                <div class="row g-3">
                    <div class="col-6">
                        <div class="text-muted small" style="color: #a0a0a0 !important;">Current Time</div>
                        <div id="clockDisplay" style="font-size: 1.5rem; font-weight: 700; color: #eef4ed; font-family: 'Cinzel', serif;">--:--</div>
                    </div>
                    <div class="col-6">
                        <div class="text-muted small" style="color: #a0a0a0 !important;">Date</div>
                        <div id="dateDisplay" style="font-size: 1rem; color: #eef4ed; font-family: 'Cinzel', serif;">--</div>
                    </div>
                    <div class="col-12 mt-2">
                        <div class="text-muted small" style="color: #a0a0a0 !important;">Today's Study</div>
                        <div id="todayStudyDisplay" style="font-size: 1.2rem; font-weight: 700; color: #f9b9f2; font-family: 'Cinzel', serif;">0 min</div>
                    </div>
                </div>

            </div>
        </div>
        <div id="settingsPanel" style="display:none">
        <div class="row g-2 justify-content-center mb-4">
            <div class="col-auto">
                <label class="form-label text-muted small" style="color: #a0a0a0 !important;">Study (min)</label>
                        <input type="number" id="studyInput" class="form-control" value="25" min="1" style="background: transparent; border-color: #a0a0a0; color: #eef4ed; width: 80px; font-family: 'Cinzel', serif; text-align: center;">
            </div>
            <div class="col-auto">
                <label class="form-label text-muted small" style="color: #a0a0a0 !important;">Break (min)</label>
                    <input type="number" id="breakInput" class="form-control" value="5" min="1" style="background: transparent; border-color: #a0a0a0; color: #eef4ed; width: 80px; font-family: 'Cinzel', serif; text-align: center;">
            </div>
            <div class="col-auto d-flex align-items-end">
                <button id="applyBtn" class="btn btn-custom btn-study" style="padding: 0.4rem 1.5rem;">Apply</button>
            </div>
        </div>
    </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
